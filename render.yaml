services:
  - type: web
    name: my-assistant-rag-api
    runtime: python
    buildCommand: pip install uv && uv sync && uv run ingest.py abhishek_profile.md
    startCommand: uv run uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ASSISTANT_NAME
        value: Abhishek
      - key: FRONTEND_URL
        sync: false
